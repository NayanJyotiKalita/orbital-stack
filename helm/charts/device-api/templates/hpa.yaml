apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: device-api
spec:
  scaleTargetRef:
    kind: Deployment
    name: device-api
    apiVersion: apps/v1

  minReplicas: 2
  maxReplicas: 6

  metrics:
    - type: Resource 
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60


